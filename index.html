<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile | LinkedIn</title>
    <script defer src="./script.js"></script>
    <link rel="icon" href="./images/icons8-linkedin-100.png" />
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body>
    <div>
      <header class="w-full h-50px flex items-center bg-white">
        <div class="h-3/5 w-50px">
          <a href="#">
            <img
              class="h-full aspect-square block justify-self-center"
              src="./images/icons8-profile-100.png"
            />
          </a>
        </div>
        <div
          class="basis-[calc(100%-100px)] h-3/5 bg-[#edf3f8] flex items-center"
        >
          <img
            class="h-3/5 aspect-square ml-10px"
            src="./images/icons8-search-100.png"
          />
          <input
            type="text"
            name="search"
            class="font-bold pl-5px pr-10px outline-none pt-[4px]"
            placeholder="Search"
          />
        </div>
        <div class="h-3/5 w-50px">
          <a href="#" class="relative">
            <img
              class="h-full aspect-square block justify-self-center"
              src="./images/icons8-chat-bubble-100.png"
            />
            <img
              src="./images/icons8-circled-1-100.png"
              class="w-[20px] aspect-square border border-double rounded-full border-white absolute top-0 right-[2px]"
            />
          </a>
        </div>
      </header>
      <section class="relative">
        <img
          src="./images/background-image-cut.jpg"
          class="w-full bg-white align-middle"
        />
        <a href="#">
          <img
            src="./images/icons8-setting-100.png"
            class="w-[25px] aspect-square absolute top-0 right-0 mr-[20px] mt-[20px] bg-white rounded-full p-5px"
          />
        </a>
      </section>
      <section class="h-50px w-100% bg-white flex">
        <a href="#" class="w-min">
          <div class="w-[100px] h-full ml-10px relative">
            <div
              class="absolute bottom-0 w-full h-2/1 bg-white rounded-full border-2 border-double border-primary-tx flex flex-col items-center justify-center"
            >
              <img src="./images/icons8-camera-100.png" class="w-50px" />
              <div class="text-[0.8em]">Add Photo</div>
            </div>
          </div>
        </a>
        <div class="w-[90px] h-full ml-auto flex items-end justify-around">
          <button>
            <img
              src="./images/icons8-share-100.png"
              class="w-[25px] aspect-square"
            />
          </button>
          <a href="#">
            <img
              src="./images/icons8-edit-100.png"
              class="w-[25px] aspect-square"
            />
          </a>
        </div>
      </section>
      <section class="py-[30px] px-10px bg-white">
        <h3>Phuc Dang</h3>
        <p>Tester</p>
        <p>CODE LEAP</p>
        <p>Vietnam <span class="dot"></span> <a href="#">74 Connections</a></p>
      </section>
      <section class="mt-10px py-20px px-10px bg-white">
        <div class="flex">
          <h4>About</h4>
          <a href="#" class="ml-auto">
            <img src="./images/icons8-edit-100.png" class="h-sm-img w-sm-img" />
          </a>
        </div>
        <p class="mt-10px">As early of 2026</p>
      </section>
    </div>
  </body>
</html>
